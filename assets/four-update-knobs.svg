<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Four Things Every Update Point Tracks</title><desc id="desc">An update point tracks possibility, energy, memory, and agreement.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 18px Arial,sans-serif;fill:#475569}.center{fill:#fff;stroke:#334155;stroke-width:5}.card{fill:#fff;stroke:#cbd5e1;stroke-width:3;rx:18}.h{font:700 24px Arial,sans-serif;fill:#0f172a}.line{stroke:#334155;stroke-width:4}</style>
  <rect class="bg" width="1200" height="560"/><text x="600" y="58" text-anchor="middle" class="t">The Four Local Knobs</text><text x="600" y="92" text-anchor="middle" class="s">Each update point carries a small local state.</text>
  <circle cx="600" cy="285" r="65" class="center"/><text x="600" y="278" text-anchor="middle" class="h">update</text><text x="600" y="307" text-anchor="middle" class="h">point</text>
  <line x1="555" y1="240" x2="350" y2="165" class="line"/><line x1="645" y1="240" x2="850" y2="165" class="line"/><line x1="555" y1="330" x2="350" y2="430" class="line"/><line x1="645" y1="330" x2="850" y2="430" class="line"/>
  <rect x="190" y="120" width="300" height="90" class="card"/><text x="340" y="174" text-anchor="middle" class="h">possibility</text><rect x="710" y="120" width="300" height="90" class="card"/><text x="860" y="174" text-anchor="middle" class="h">energy</text><rect x="190" y="390" width="300" height="90" class="card"/><text x="340" y="444" text-anchor="middle" class="h">memory</text><rect x="710" y="390" width="300" height="90" class="card"/><text x="860" y="444" text-anchor="middle" class="h">agreement</text>
</svg>
