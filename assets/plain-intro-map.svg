<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Plain-Language Roadmap</title><desc id="desc">A simple path from finite budget to stable reality.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 19px Arial,sans-serif;fill:#475569}.box{fill:#fff;stroke:#cbd5e1;stroke-width:3;rx:18}.a{stroke:#334155;stroke-width:5;fill:none;marker-end:url(#m)}.h{font:700 23px Arial,sans-serif;fill:#0f172a}</style>
  <defs><marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2L10 6L2 10Z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1200" height="520"/><text x="600" y="58" text-anchor="middle" class="t">The Big Picture</text><text x="600" y="92" text-anchor="middle" class="s">Finite budget turns open possibility into stable physical patterns.</text>
  <rect x="85" y="205" width="205" height="105" class="box"/><text x="188" y="265" text-anchor="middle" class="h">finite budget</text>
  <rect x="350" y="205" width="205" height="105" class="box"/><text x="453" y="252" text-anchor="middle" class="h">change cost</text><text x="453" y="282" text-anchor="middle" class="s">prices updates</text>
  <rect x="615" y="205" width="205" height="105" class="box"/><text x="718" y="252" text-anchor="middle" class="h">possibility</text><text x="718" y="282" text-anchor="middle" class="s">narrows</text>
  <rect x="880" y="205" width="205" height="105" class="box"/><text x="983" y="252" text-anchor="middle" class="h">stable reality</text><text x="983" y="282" text-anchor="middle" class="s">persists</text>
  <path d="M290 258H340" class="a"/><path d="M555 258H605" class="a"/><path d="M820 258H870" class="a"/>
</svg>
