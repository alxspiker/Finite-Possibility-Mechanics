<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Information Is Not Free</title><desc id="desc">Changing, recording, correcting, and erasing information all spend energy.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 19px Arial,sans-serif;fill:#475569}.card{fill:#fff;stroke:#cbd5e1;stroke-width:3;rx:18}.chip{fill:#dbeafe;stroke:#2563eb;stroke-width:4;rx:14}.heat{fill:#fee2e2;stroke:#ef4444;stroke-width:4;rx:14}.h{font:700 23px Arial,sans-serif;fill:#0f172a}.a{stroke:#334155;stroke-width:5;fill:none;marker-end:url(#m)}</style>
  <defs><marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2L10 6L2 10Z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1200" height="520"/><text x="600" y="58" text-anchor="middle" class="t">Information Has a Physical Price</text><text x="600" y="92" text-anchor="middle" class="s">A recorded pattern has to be carried by something physical.</text>
  <rect x="110" y="170" width="260" height="175" class="card"/><rect x="165" y="220" width="150" height="70" class="chip"/><text x="240" y="263" text-anchor="middle" class="h">bit pattern</text>
  <path d="M390 258H510" class="a"/><rect x="530" y="170" width="260" height="175" class="card"/><text x="660" y="235" text-anchor="middle" class="h">change or erase</text><text x="660" y="275" text-anchor="middle" class="s">hardware must change</text>
  <path d="M810 258H930" class="a"/><rect x="950" y="170" width="210" height="175" class="heat"/><text x="1055" y="245" text-anchor="middle" class="h">energy spent</text><text x="1055" y="278" text-anchor="middle" class="s">heat / cost</text>
</svg>
