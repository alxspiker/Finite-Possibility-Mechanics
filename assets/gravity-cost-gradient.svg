<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Gravity as a Change-Cost Gradient</title>
  <desc id="desc">A large stable pattern changes nearby update costs, so paths bend toward cheaper changes.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
    <radialGradient id="well" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.95"/>
      <stop offset="42%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.05"/>
    </radialGradient>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 34px Arial, sans-serif; fill:#0f172a}
      .sub{font:400 20px Arial, sans-serif; fill:#475569}
      .grid{stroke:#dbeafe; stroke-width:2}
      .costRing{fill:none; stroke:#94a3b8; stroke-width:3; stroke-dasharray:10 12}
      .path{fill:none; stroke:#0f766e; stroke-width:8; stroke-linecap:round; marker-end:url(#arrow)}
      .straight{fill:none; stroke:#94a3b8; stroke-width:4; stroke-linecap:round; stroke-dasharray:12 12}
      .label{font:700 24px Arial, sans-serif; fill:#0f172a}
      .small{font:400 18px Arial, sans-serif; fill:#475569}
      .badge{fill:#ffffff; stroke:#cbd5e1; stroke-width:3; rx:16}
    </style>
  </defs>
  <rect class="bg" width="1200" height="680"/>
  <text x="600" y="58" text-anchor="middle" class="title">Gravity as a Change-Cost Gradient</text>
  <text x="600" y="91" text-anchor="middle" class="sub">A large stable pattern makes some nearby changes cheaper than others.</text>

  <g>
    <path d="M80 150 H1120 M80 210 H1120 M80 270 H1120 M80 330 H1120 M80 390 H1120 M80 450 H1120 M80 510 H1120 M80 570 H1120" class="grid"/>
    <path d="M120 130 V590 M200 130 V590 M280 130 V590 M360 130 V590 M440 130 V590 M520 130 V590 M600 130 V590 M680 130 V590 M760 130 V590 M840 130 V590 M920 130 V590 M1000 130 V590 M1080 130 V590" class="grid"/>
  </g>

  <circle cx="755" cy="350" r="245" fill="url(#well)"/>
  <circle cx="755" cy="350" r="70" fill="#f59e0b" stroke="#92400e" stroke-width="6"/>
  <circle cx="755" cy="350" r="140" class="costRing"/>
  <circle cx="755" cy="350" r="215" class="costRing"/>
  <text x="755" y="346" text-anchor="middle" class="label">large stable</text>
  <text x="755" y="374" text-anchor="middle" class="label">pattern</text>

  <path d="M165 230 C330 230 450 245 560 305 C625 340 665 350 690 350" class="straight"/>
  <path d="M165 230 C345 250 455 285 555 340 C620 378 660 380 692 366" class="path"/>

  <path d="M170 480 C330 480 450 460 560 410 C625 382 665 365 690 358" class="straight"/>
  <path d="M170 480 C350 462 460 430 560 385 C625 356 663 350 692 350" class="path"/>

  <rect x="90" y="555" width="380" height="78" class="badge"/>
  <text x="280" y="586" text-anchor="middle" class="label">Path rule</text>
  <text x="280" y="613" text-anchor="middle" class="small">motion bends toward cheaper next changes</text>

  <rect x="820" y="555" width="300" height="78" class="badge"/>
  <text x="970" y="586" text-anchor="middle" class="label">Not a force added on</text>
  <text x="970" y="613" text-anchor="middle" class="small">the cost landscape changed</text>
</svg>
