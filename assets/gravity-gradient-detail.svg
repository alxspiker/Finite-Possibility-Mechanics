<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Gravity as Uneven Change Cost</title><desc id="desc">Nearby paths have different costs around a large stable pattern.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 18px Arial,sans-serif;fill:#475569}.planet{fill:#f59e0b;stroke:#92400e;stroke-width:6}.path{stroke:#0f766e;stroke-width:7;fill:none}.cost{fill:#fff;stroke:#cbd5e1;stroke-width:3;rx:14}.h{font:700 23px Arial,sans-serif;fill:#0f172a}</style>
  <rect class="bg" width="1200" height="540"/><text x="600" y="58" text-anchor="middle" class="t">Gravity Is a Change-Cost Gradient</text><text x="600" y="92" text-anchor="middle" class="s">Motion bends because one next change is cheaper to maintain than another.</text>
  <circle cx="780" cy="270" r="82" class="planet"/><path d="M150 180C330 190 510 240 700 265" class="path"/><path d="M150 400C330 390 510 320 700 285" class="path"/>
  <rect x="180" y="120" width="230" height="70" class="cost"/><text x="295" y="164" text-anchor="middle" class="h">higher mismatch</text><rect x="470" y="350" width="230" height="70" class="cost"/><text x="585" y="394" text-anchor="middle" class="h">better agreement</text>
  <text x="780" y="455" text-anchor="middle" class="s">large stable patterns reshape nearby costs</text>
</svg>
