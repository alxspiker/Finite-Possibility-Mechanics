<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">When Memory Becomes a Trap</title><desc id="desc">A wrong expectation can become stable and trap future updates.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 18px Arial,sans-serif;fill:#475569}.good{fill:#ccfbf1;stroke:#0f766e;stroke-width:5;rx:18}.bad{fill:#fee2e2;stroke:#ef4444;stroke-width:5;rx:18}.line{stroke:#334155;stroke-width:5;fill:none;marker-end:url(#m)}.loop{stroke:#ef4444;stroke-width:7;fill:none;marker-end:url(#r)}.h{font:700 23px Arial,sans-serif;fill:#0f172a}</style>
  <defs><marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2L10 6L2 10Z" fill="#334155"/></marker><marker id="r" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2L10 6L2 10Z" fill="#ef4444"/></marker></defs>
  <rect class="bg" width="1200" height="560"/><text x="600" y="58" text-anchor="middle" class="t">Stability Does Not Always Mean Truth</text><text x="600" y="92" text-anchor="middle" class="s">A wrong pattern can become cheap to repeat if it gets locked in too strongly.</text>
  <rect x="95" y="190" width="250" height="110" class="bad"/><text x="220" y="238" text-anchor="middle" class="h">wrong expectation</text><text x="220" y="268" text-anchor="middle" class="s">bad prior</text>
  <path d="M360 245H495" class="line"/><rect x="510" y="190" width="250" height="110" class="bad"/><text x="635" y="238" text-anchor="middle" class="h">low budget</text><text x="635" y="268" text-anchor="middle" class="s">forced shortcut</text>
  <path d="M775 245H910" class="line"/><rect x="925" y="190" width="250" height="110" class="bad"/><text x="1050" y="238" text-anchor="middle" class="h">false stability</text><text x="1050" y="268" text-anchor="middle" class="s">cheap but wrong</text>
  <path d="M1050 315C1000 430 760 455 620 355C505 275 350 340 245 315" class="loop"/><text x="600" y="470" text-anchor="middle" class="s">Memory helps when aligned. Memory traps when it repeats the wrong pattern.</text>
</svg>
