<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Galaxy Rotation and Disk Cost Fields</title>
  <desc id="desc">A round source fades steeply, while a disk-shaped cost field spreads outward and can flatten rotation.</desc>
  <defs>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 34px Arial, sans-serif; fill:#0f172a}
      .sub{font:400 20px Arial, sans-serif; fill:#475569}
      .panel{fill:#ffffff; stroke:#cbd5e1; stroke-width:3; rx:20}
      .label{font:700 25px Arial, sans-serif; fill:#0f172a}
      .small{font:400 18px Arial, sans-serif; fill:#475569}
      .axis{stroke:#334155; stroke-width:4}
      .curveA{fill:none; stroke:#ef4444; stroke-width:7; stroke-linecap:round}
      .curveB{fill:none; stroke:#2563eb; stroke-width:7; stroke-linecap:round}
      .disk{fill:#dbeafe; stroke:#2563eb; stroke-width:5}
      .core{fill:#f59e0b; stroke:#92400e; stroke-width:5}
      .orbit{fill:none; stroke:#94a3b8; stroke-width:3; stroke-dasharray:8 10}
      .star{fill:#0f766e}
      .arrow{fill:none; stroke:#2563eb; stroke-width:5; marker-end:url(#arrowBlue)}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text x="600" y="58" text-anchor="middle" class="title">Galaxy Rotation and Disk Cost Fields</text>
  <text x="600" y="91" text-anchor="middle" class="sub">A disk-shaped pattern spreads change cost differently than a round central source.</text>

  <rect x="70" y="130" width="500" height="500" class="panel"/>
  <text x="320" y="180" text-anchor="middle" class="label">Round Source</text>
  <text x="320" y="210" text-anchor="middle" class="small">influence fades steeply with distance</text>
  <circle cx="320" cy="365" r="42" class="core"/>
  <circle cx="320" cy="365" r="95" class="orbit"/>
  <circle cx="320" cy="365" r="150" class="orbit"/>
  <circle cx="320" cy="365" r="205" class="orbit"/>
  <circle cx="450" cy="300" r="9" class="star"/>
  <circle cx="505" cy="365" r="7" class="star"/>
  <circle cx="440" cy="500" r="6" class="star"/>
  <path d="M130 575 H520 M130 575 V455" class="axis"/>
  <path d="M155 475 C235 492 335 530 500 560" class="curveA"/>
  <text x="325" y="610" text-anchor="middle" class="small">expected speed drops more quickly</text>

  <rect x="630" y="130" width="500" height="500" class="panel"/>
  <text x="880" y="180" text-anchor="middle" class="label">Disk Cost Field</text>
  <text x="880" y="210" text-anchor="middle" class="small">the whole disk helps shape cheaper paths</text>
  <ellipse cx="880" cy="365" rx="210" ry="92" class="disk"/>
  <circle cx="880" cy="365" r="36" class="core"/>
  <ellipse cx="880" cy="365" rx="150" ry="62" class="orbit"/>
  <ellipse cx="880" cy="365" rx="235" ry="105" class="orbit"/>
  <circle cx="995" cy="320" r="8" class="star"/>
  <circle cx="1055" cy="365" r="8" class="star"/>
  <circle cx="740" cy="395" r="8" class="star"/>
  <path d="M745 322 C815 280 960 280 1032 326" class="arrow"/>
  <path d="M690 575 H1080 M690 575 V455" class="axis"/>
  <path d="M715 520 C800 500 900 500 1058 504" class="curveB"/>
  <text x="885" y="610" text-anchor="middle" class="small">outer speed stays flatter for longer</text>
</svg>
