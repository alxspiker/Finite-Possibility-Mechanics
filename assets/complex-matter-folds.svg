<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Why Complex Matter Folds</title><desc id="desc">A spread-out chain folds into a compact stable shape while avoiding overlap.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 18px Arial,sans-serif;fill:#475569}.chain{stroke:#2563eb;stroke-width:8;fill:none;stroke-linecap:round}.fold{stroke:#0f766e;stroke-width:8;fill:none;stroke-linecap:round}.dot{fill:#fff;stroke:#334155;stroke-width:4}.bad{stroke:#ef4444;stroke-width:6;stroke-linecap:round}.arrow{stroke:#334155;stroke-width:5;fill:none;marker-end:url(#m)}.h{font:700 23px Arial,sans-serif;fill:#0f172a}</style>
  <defs><marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2L10 6L2 10Z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1200" height="560"/><text x="600" y="58" text-anchor="middle" class="t">Complex Matter Folds Toward Compact Stability</text><text x="600" y="92" text-anchor="middle" class="s">Spread-out forms can cost more, but overlap is still forbidden.</text>
  <path d="M105 290C170 225 230 350 295 285C360 220 420 350 485 285" class="chain"/><g><circle cx="105" cy="290" r="13" class="dot"/><circle cx="230" cy="350" r="13" class="dot"/><circle cx="360" cy="220" r="13" class="dot"/><circle cx="485" cy="285" r="13" class="dot"/></g><text x="295" y="420" text-anchor="middle" class="h">spread-out chain</text>
  <path d="M540 285H650" class="arrow"/>
  <path d="M760 300C750 210 890 190 940 260C1010 360 850 420 790 345C750 295 840 265 890 325" class="fold"/><g><circle cx="760" cy="300" r="13" class="dot"/><circle cx="940" cy="260" r="13" class="dot"/><circle cx="790" cy="345" r="13" class="dot"/><circle cx="890" cy="325" r="13" class="dot"/></g><path d="M835 260L910 360M910 260L835 360" class="bad"/><text x="875" y="420" text-anchor="middle" class="h">compact, no-overlap shape</text>
</svg>
