<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Smooth Changes Are Cheaper</title><desc id="desc">A smooth path has lower mismatch than a sharp jump.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 18px Arial,sans-serif;fill:#475569}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:3;rx:18}.smooth{stroke:#0f766e;stroke-width:9;fill:none;stroke-linecap:round}.jump{stroke:#ef4444;stroke-width:9;fill:none;stroke-linecap:round;stroke-linejoin:round}.dot{fill:#fff;stroke:#cbd5e1;stroke-width:3}.h{font:700 24px Arial,sans-serif;fill:#0f172a}</style>
  <rect class="bg" width="1200" height="560"/><text x="600" y="58" text-anchor="middle" class="t">Smooth Changes Are Cheaper Than Sharp Jumps</text><text x="600" y="92" text-anchor="middle" class="s">Nearby updates prefer to fit together instead of lurching apart.</text>
  <rect x="80" y="150" width="480" height="320" class="panel"/><text x="320" y="205" text-anchor="middle" class="h">smooth change</text><path d="M145 350C240 260 400 260 495 350" class="smooth"/><circle cx="145" cy="350" r="12" class="dot"/><circle cx="245" cy="295" r="12" class="dot"/><circle cx="395" cy="295" r="12" class="dot"/><circle cx="495" cy="350" r="12" class="dot"/><text x="320" y="425" text-anchor="middle" class="s">low mismatch between neighbors</text>
  <rect x="640" y="150" width="480" height="320" class="panel"/><text x="880" y="205" text-anchor="middle" class="h">sharp jump</text><path d="M705 365L830 365L830 245L995 245" class="jump"/><circle cx="705" cy="365" r="12" class="dot"/><circle cx="830" cy="365" r="12" class="dot"/><circle cx="830" cy="245" r="12" class="dot"/><circle cx="995" cy="245" r="12" class="dot"/><text x="880" y="425" text-anchor="middle" class="s">extra correction cost</text>
</svg>
