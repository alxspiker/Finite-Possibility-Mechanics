<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Decay and Instability</title><desc id="desc">An expensive unstable pattern breaks into cheaper stable pieces.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 18px Arial,sans-serif;fill:#475569}.unstable{fill:#fee2e2;stroke:#ef4444;stroke-width:6}.stable{fill:#ccfbf1;stroke:#0f766e;stroke-width:5}.crack{stroke:#991b1b;stroke-width:6;fill:none}.arr{stroke:#334155;stroke-width:5;fill:none;marker-end:url(#m)}.h{font:700 23px Arial,sans-serif;fill:#0f172a}</style>
  <defs><marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2L10 6L2 10Z" fill="#334155"/></marker></defs>
  <rect class="bg" width="1200" height="540"/><text x="600" y="58" text-anchor="middle" class="t">Unstable Patterns Decay</text><text x="600" y="92" text-anchor="middle" class="s">If a pattern cannot keep paying to remain itself, it falls into cheaper arrangements.</text>
  <path d="M260 175L390 260L330 405L185 390L145 245Z" class="unstable"/><path d="M245 205L285 275L235 340M300 245L335 330" class="crack"/><text x="270" y="455" text-anchor="middle" class="h">expensive unstable pattern</text>
  <path d="M470 285H610" class="arr"/><circle cx="720" cy="240" r="50" class="stable"/><circle cx="860" cy="310" r="42" class="stable"/><circle cx="980" cy="235" r="34" class="stable"/><text x="860" y="455" text-anchor="middle" class="h">cheaper stable pieces</text>
</svg>
