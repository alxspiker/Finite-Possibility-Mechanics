<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">One Rule Behind Many Effects</title><desc id="desc">Change cost branches into many physical effects.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 18px Arial,sans-serif;fill:#475569}.core{fill:#0f766e;stroke:#115e59;stroke-width:4;rx:22}.box{fill:#fff;stroke:#cbd5e1;stroke-width:3;rx:16}.h{font:700 22px Arial,sans-serif;fill:#0f172a}.ct{font:700 27px Arial,sans-serif;fill:#fff}.line{stroke:#334155;stroke-width:4;fill:none}</style>
  <rect class="bg" width="1200" height="560"/><text x="600" y="58" text-anchor="middle" class="t">One Rule, Many Effects</text><text x="600" y="92" text-anchor="middle" class="s">Different physics can be different faces of the same change-cost ledger.</text>
  <rect x="450" y="235" width="300" height="105" class="core"/><text x="600" y="298" text-anchor="middle" class="ct">change cost</text>
  <g><line x1="600" y1="235" x2="600" y2="155" class="line"/><line x1="510" y1="250" x2="280" y2="165" class="line"/><line x1="690" y1="250" x2="920" y2="165" class="line"/><line x1="510" y1="325" x2="280" y2="430" class="line"/><line x1="690" y1="325" x2="920" y2="430" class="line"/></g>
  <rect x="480" y="105" width="240" height="70" class="box"/><text x="600" y="148" text-anchor="middle" class="h">collapse</text><rect x="120" y="115" width="240" height="70" class="box"/><text x="240" y="158" text-anchor="middle" class="h">gravity</text><rect x="840" y="115" width="240" height="70" class="box"/><text x="960" y="158" text-anchor="middle" class="h">mass</text><rect x="120" y="410" width="240" height="70" class="box"/><text x="240" y="453" text-anchor="middle" class="h">time slowing</text><rect x="840" y="410" width="240" height="70" class="box"/><text x="960" y="453" text-anchor="middle" class="h">stability</text>
</svg>
