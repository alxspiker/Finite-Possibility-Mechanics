<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Light Hitting a Wall</title><desc id="desc">A cheap moving light pattern meets a stable memory pattern and records an interaction.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 18px Arial,sans-serif;fill:#475569}.dot{fill:#fff;stroke:#cbd5e1;stroke-width:3}.on{fill:#fef3c7;stroke:#f59e0b;stroke-width:4}.wall{fill:#cbd5e1;stroke:#64748b;stroke-width:4}.hit{fill:#fee2e2;stroke:#ef4444;stroke-width:5}.h{font:700 23px Arial,sans-serif;fill:#0f172a}</style>
  <rect class="bg" width="1200" height="540"/><text x="600" y="58" text-anchor="middle" class="t">A Light Pattern Meets Stable Matter</text><text x="600" y="92" text-anchor="middle" class="s">The moving pattern is cheap until it interacts with a stable wall pattern.</text>
  <g><circle cx="130" cy="270" r="10" class="dot"/><circle cx="210" cy="270" r="10" class="dot"/><circle cx="290" cy="270" r="10" class="on"/><circle cx="370" cy="270" r="13" class="on"/><circle cx="450" cy="270" r="17" class="on"/><circle cx="530" cy="270" r="13" class="on"/><circle cx="610" cy="270" r="10" class="on"/></g>
  <rect x="760" y="150" width="190" height="270" class="wall"/><line x1="760" y1="150" x2="950" y2="420" stroke="#94a3b8" stroke-width="3"/><line x1="950" y1="150" x2="760" y2="420" stroke="#94a3b8" stroke-width="3"/><circle cx="760" cy="270" r="36" class="hit"/><text x="760" y="279" text-anchor="middle" class="h">hit</text>
  <text x="360" y="390" text-anchor="middle" class="s">state is handed forward at low cost</text><text x="855" y="455" text-anchor="middle" class="s">interaction creates a recorded outcome</text>
</svg>
