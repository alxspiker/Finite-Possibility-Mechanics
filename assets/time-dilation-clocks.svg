<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Heavy Regions Slow Local Clocks</title><desc id="desc">A clock in a high-burden region completes fewer local updates.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 18px Arial,sans-serif;fill:#475569}.well{fill:#fde68a;stroke:#92400e;stroke-width:6}.clock{fill:#e0f2fe;stroke:#0284c7;stroke-width:5}.h{font:700 23px Arial,sans-serif;fill:#0f172a}.tick{stroke:#0284c7;stroke-width:6;stroke-linecap:round}</style>
  <rect class="bg" width="1200" height="540"/><text x="600" y="58" text-anchor="middle" class="t">Time Slows Where Updates Are Heavier</text><text x="600" y="92" text-anchor="middle" class="s">The clock is not broken. It is updating inside a harder workload.</text>
  <circle cx="385" cy="285" r="115" class="well"/><text x="385" y="292" text-anchor="middle" class="h">heavy region</text><circle cx="385" cy="425" r="48" class="clock"/><line x1="385" y1="425" x2="385" y2="395" class="tick"/><line x1="385" y1="425" x2="405" y2="438" class="tick"/><text x="385" y="500" text-anchor="middle" class="s">fewer local ticks</text>
  <circle cx="850" cy="285" r="70" fill="#dcfce7" stroke="#16a34a" stroke-width="5"/><text x="850" y="292" text-anchor="middle" class="h">lighter region</text><circle cx="850" cy="425" r="48" class="clock"/><line x1="850" y1="425" x2="850" y2="390" class="tick"/><line x1="850" y1="425" x2="882" y2="425" class="tick"/><text x="850" y="500" text-anchor="middle" class="s">more local ticks</text>
</svg>
