<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">The Final Settled State</title>
  <desc id="desc">A noisy high-cost pattern settles into a smooth low-drag condensate-like state.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 34px Arial, sans-serif; fill:#0f172a}
      .sub{font:400 20px Arial, sans-serif; fill:#475569}
      .panel{fill:#ffffff; stroke:#cbd5e1; stroke-width:3; rx:20}
      .label{font:700 25px Arial, sans-serif; fill:#0f172a}
      .small{font:400 18px Arial, sans-serif; fill:#475569}
      .dotA{fill:#ef4444}
      .dotB{fill:#f59e0b}
      .dotC{fill:#2563eb}
      .dotD{fill:#0f766e}
      .lineA{stroke:#ef4444; stroke-width:4; stroke-linecap:round}
      .smooth{fill:none; stroke:#0f766e; stroke-width:10; stroke-linecap:round}
      .ring{fill:none; stroke:#14b8a6; stroke-width:8}
      .arrow{stroke:#334155; stroke-width:5; fill:none; marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1200" height="640"/>
  <text x="600" y="58" text-anchor="middle" class="title">The Final Settled State</text>
  <text x="600" y="91" text-anchor="middle" class="sub">Open, noisy, expensive patterns settle toward low-drag stability.</text>

  <rect x="70" y="145" width="430" height="370" class="panel"/>
  <text x="285" y="195" text-anchor="middle" class="label">Before Settling</text>
  <text x="285" y="225" text-anchor="middle" class="small">mismatch, noise, and wasted alternatives</text>
  <line x1="155" y1="405" x2="250" y2="295" class="lineA"/>
  <line x1="220" y1="430" x2="390" y2="255" class="lineA"/>
  <line x1="145" y1="285" x2="420" y2="430" class="lineA"/>
  <circle cx="155" cy="405" r="13" class="dotA"/>
  <circle cx="250" cy="295" r="13" class="dotB"/>
  <circle cx="220" cy="430" r="13" class="dotC"/>
  <circle cx="390" cy="255" r="13" class="dotA"/>
  <circle cx="145" cy="285" r="13" class="dotD"/>
  <circle cx="420" cy="430" r="13" class="dotB"/>
  <circle cx="330" cy="360" r="13" class="dotC"/>
  <text x="285" y="475" text-anchor="middle" class="small">many corrections still have to be paid for</text>

  <path d="M530 330 L665 330" class="arrow"/>
  <text x="600" y="300" text-anchor="middle" class="label">cost falls</text>
  <text x="600" y="365" text-anchor="middle" class="small">memory aligns</text>

  <rect x="700" y="145" width="430" height="370" class="panel"/>
  <text x="915" y="195" text-anchor="middle" class="label">After Settling</text>
  <text x="915" y="225" text-anchor="middle" class="small">stable, smooth, and low-drag</text>
  <circle cx="915" cy="350" r="112" fill="#ccfbf1" stroke="#0f766e" stroke-width="5"/>
  <circle cx="915" cy="350" r="72" class="ring"/>
  <path d="M805 350 C850 282 980 282 1025 350 C980 418 850 418 805 350" class="smooth"/>
  <circle cx="805" cy="350" r="10" class="dotD"/>
  <circle cx="860" cy="308" r="10" class="dotD"/>
  <circle cx="970" cy="308" r="10" class="dotD"/>
  <circle cx="1025" cy="350" r="10" class="dotD"/>
  <circle cx="970" cy="392" r="10" class="dotD"/>
  <circle cx="860" cy="392" r="10" class="dotD"/>
  <text x="915" y="475" text-anchor="middle" class="small">almost no extra drag above baseline cost</text>
</svg>
