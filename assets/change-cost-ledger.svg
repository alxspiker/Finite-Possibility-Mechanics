<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Change Cost Ledger</title>
  <desc id="desc">One central change cost ledger connects collapse, gravity, mass, time slowing, decay, and stability.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg{fill:#f8fafc}
      .title{font:700 34px Arial, sans-serif; fill:#0f172a}
      .sub{font:400 20px Arial, sans-serif; fill:#475569}
      .card{fill:#ffffff; stroke:#cbd5e1; stroke-width:3; rx:20; filter:url(#shadow)}
      .core{fill:#0f766e; stroke:#115e59; stroke-width:4; rx:24; filter:url(#shadow)}
      .coreText{font:700 31px Arial, sans-serif; fill:#ffffff}
      .coreSmall{font:400 18px Arial, sans-serif; fill:#ccfbf1}
      .label{font:700 24px Arial, sans-serif; fill:#0f172a}
      .body{font:400 17px Arial, sans-serif; fill:#475569}
      .line{stroke:#334155; stroke-width:4; fill:none; marker-end:url(#arrow)}
      .iconStroke{stroke-width:8; fill:none; stroke-linecap:round; stroke-linejoin:round}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text x="600" y="58" text-anchor="middle" class="title">One Ledger, Many Effects</text>
  <text x="600" y="91" text-anchor="middle" class="sub">The same change cost shows up differently depending on the pattern.</text>

  <rect x="430" y="260" width="340" height="160" class="core"/>
  <text x="600" y="326" text-anchor="middle" class="coreText">Change Cost</text>
  <text x="600" y="360" text-anchor="middle" class="coreSmall">the price of becoming</text>
  <text x="600" y="386" text-anchor="middle" class="coreSmall">the next state</text>

  <line x1="520" y1="265" x2="300" y2="166" class="line"/>
  <line x1="600" y1="260" x2="600" y2="160" class="line"/>
  <line x1="680" y1="265" x2="900" y2="166" class="line"/>
  <line x1="520" y1="415" x2="300" y2="548" class="line"/>
  <line x1="600" y1="420" x2="600" y2="560" class="line"/>
  <line x1="680" y1="415" x2="900" y2="548" class="line"/>

  <rect x="110" y="115" width="260" height="120" class="card"/>
  <path d="M170 176 C205 132 250 220 310 155" class="iconStroke" stroke="#2563eb"/>
  <text x="240" y="206" text-anchor="middle" class="label">Collapse</text>
  <text x="240" y="226" text-anchor="middle" class="body">open paths narrow</text>

  <rect x="470" y="110" width="260" height="120" class="card"/>
  <circle cx="560" cy="166" r="32" fill="#f59e0b"/>
  <path d="M620 132 C600 168 600 174 620 210" class="iconStroke" stroke="#334155"/>
  <text x="600" y="206" text-anchor="middle" class="label">Gravity</text>
  <text x="600" y="226" text-anchor="middle" class="body">motion bends cheaper</text>

  <rect x="830" y="115" width="260" height="120" class="card"/>
  <rect x="900" y="142" width="82" height="48" rx="10" fill="#64748b"/>
  <path d="M900 190 L982 190 L1005 210 L878 210 Z" fill="#334155"/>
  <text x="960" y="206" text-anchor="middle" class="label">Mass</text>
  <text x="960" y="226" text-anchor="middle" class="body">stable cost feels heavy</text>

  <rect x="110" y="500" width="260" height="120" class="card"/>
  <circle cx="203" cy="555" r="38" fill="#e0f2fe" stroke="#0284c7" stroke-width="5"/>
  <path d="M203 555 L203 528 M203 555 L229 570" class="iconStroke" stroke="#0284c7"/>
  <text x="240" y="596" text-anchor="middle" class="label">Time Slowing</text>
  <text x="240" y="616" text-anchor="middle" class="body">harder updates tick slower</text>

  <rect x="470" y="505" width="260" height="120" class="card"/>
  <path d="M535 565 L580 520 L625 565 L580 610 Z" fill="#ef4444"/>
  <path d="M650 538 L670 560 L650 582" class="iconStroke" stroke="#991b1b"/>
  <text x="600" y="596" text-anchor="middle" class="label">Decay</text>
  <text x="600" y="616" text-anchor="middle" class="body">unstable patterns fail</text>

  <rect x="830" y="500" width="260" height="120" class="card"/>
  <path d="M905 570 C935 520 985 520 1015 570 C985 620 935 620 905 570 Z" fill="#dcfce7" stroke="#16a34a" stroke-width="5"/>
  <circle cx="960" cy="570" r="17" fill="#16a34a"/>
  <text x="960" y="596" text-anchor="middle" class="label">Stability</text>
  <text x="960" y="616" text-anchor="middle" class="body">cheap patterns persist</text>
</svg>
