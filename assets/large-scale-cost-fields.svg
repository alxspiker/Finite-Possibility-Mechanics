<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Large-Scale Cost Fields</title>
  <desc id="desc">The same change-cost rule appears as gravity, extreme finite wells, galaxy disk fields, and final settling.</desc>
  <defs><style>.bg{fill:#f8fafc}.title{font:700 34px Arial,sans-serif;fill:#0f172a}.sub{font:400 20px Arial,sans-serif;fill:#475569}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:3;rx:20}.label{font:700 23px Arial,sans-serif;fill:#0f172a}.small{font:400 17px Arial,sans-serif;fill:#475569}.ring{fill:none;stroke:#94a3b8;stroke-width:3;stroke-dasharray:8 10}.planet{fill:#f59e0b;stroke:#92400e;stroke-width:5}.path{stroke:#0f766e;stroke-width:6;fill:none;stroke-linecap:round}.barrier{fill:none;stroke:#ef4444;stroke-width:10}.disk{fill:#dbeafe;stroke:#2563eb;stroke-width:5}.smooth{fill:none;stroke:#0f766e;stroke-width:9;stroke-linecap:round}</style></defs>
  <rect class="bg" width="1200" height="760"/><text x="600" y="58" text-anchor="middle" class="title">Large-Scale Cost Fields</text><text x="600" y="91" text-anchor="middle" class="sub">The same rule changes shape at planetary, trapped, galactic, and cosmic scales.</text>
  <rect x="70" y="135" width="520" height="250" class="panel"/><text x="330" y="178" text-anchor="middle" class="label">Gravity Field</text><circle cx="330" cy="265" r="44" class="planet"/><circle cx="330" cy="265" r="90" class="ring"/><circle cx="330" cy="265" r="130" class="ring"/><path d="M150 205C220 215 260 245 300 265" class="path"/><text x="330" y="355" text-anchor="middle" class="small">motion bends toward lower-cost changes</text>
  <rect x="630" y="135" width="500" height="250" class="panel"/><text x="880" y="178" text-anchor="middle" class="label">Extreme Finite Well</text><circle cx="880" cy="265" r="42" fill="#fef3c7" stroke="#92400e" stroke-width="5"/><circle cx="880" cy="265" r="105" class="barrier"/><path d="M720 200C795 245 820 265 850 265" class="path"/><text x="880" y="355" text-anchor="middle" class="small">deep trap, but not a true infinity</text>
  <rect x="70" y="430" width="520" height="250" class="panel"/><text x="330" y="473" text-anchor="middle" class="label">Galaxy Disk Field</text><ellipse cx="330" cy="560" rx="190" ry="70" class="disk"/><circle cx="330" cy="560" r="26" class="planet"/><path d="M170 535C250 500 410 500 490 535" class="path"/><text x="330" y="650" text-anchor="middle" class="small">a broad disk can flatten outer motion</text>
  <rect x="630" y="430" width="500" height="250" class="panel"/><text x="880" y="473" text-anchor="middle" class="label">Final Settled State</text><circle cx="880" cy="560" r="86" fill="#ccfbf1" stroke="#0f766e" stroke-width="5"/><path d="M795 560C835 515 925 515 965 560C925 605 835 605 795 560" class="smooth"/><text x="880" y="650" text-anchor="middle" class="small">almost no extra drag above baseline cost</text>
</svg>
