<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Cheap Does Not Always Mean Light</title><desc id="desc">Stable reuse can be cheap while a huge locked pattern still creates large nearby costs.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 18px Arial,sans-serif;fill:#475569}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:3;rx:18}.reuse{fill:#ccfbf1;stroke:#0f766e;stroke-width:5;rx:16}.planet{fill:#f59e0b;stroke:#92400e;stroke-width:6}.ring{fill:none;stroke:#94a3b8;stroke-width:3;stroke-dasharray:8 10}.h{font:700 23px Arial,sans-serif;fill:#0f172a}</style>
  <rect class="bg" width="1200" height="540"/><text x="600" y="58" text-anchor="middle" class="t">Stable Can Be Cheap to Reuse and Still Heavy</text><text x="600" y="92" text-anchor="middle" class="s">A large locked pattern changes many nearby updates even if its own memory repeats cheaply.</text>
  <rect x="110" y="165" width="420" height="260" class="panel"/><rect x="220" y="235" width="200" height="95" class="reuse"/><text x="320" y="288" text-anchor="middle" class="h">cheap reuse</text><text x="320" y="372" text-anchor="middle" class="s">stable memory does not recalculate every possibility</text>
  <rect x="670" y="165" width="420" height="260" class="panel"/><circle cx="880" cy="290" r="58" class="planet"/><circle cx="880" cy="290" r="115" class="ring"/><circle cx="880" cy="290" r="170" class="ring"/><text x="880" y="372" text-anchor="middle" class="s">huge structure changes surrounding costs</text>
</svg>
