<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Possibility Hardens Into Memory</title>
  <desc id="desc">Many faint possibilities narrow into a stable reusable memory pattern.</desc>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
  <style>.bg{fill:#f8fafc}.title{font:700 34px Arial,sans-serif;fill:#0f172a}.sub{font:400 20px Arial,sans-serif;fill:#475569}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:3;rx:20}.faint{stroke:#93c5fd;stroke-width:5;fill:none;stroke-linecap:round}.solid{stroke:#0f766e;stroke-width:10;fill:none;stroke-linecap:round}.mem{fill:#ccfbf1;stroke:#0f766e;stroke-width:6;rx:18}.label{font:700 25px Arial,sans-serif;fill:#0f172a}.small{font:400 18px Arial,sans-serif;fill:#475569}.arrow{stroke:#334155;stroke-width:5;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect class="bg" width="1200" height="640"/><text x="600" y="58" text-anchor="middle" class="title">Possibility Hardens Into Memory</text><text x="600" y="91" text-anchor="middle" class="sub">A stable pattern is cheaper to reuse than to rebuild from scratch.</text>
  <rect x="70" y="145" width="430" height="390" class="panel"/><text x="285" y="195" text-anchor="middle" class="label">Open Possibility</text>
  <circle cx="150" cy="335" r="16" fill="#fff" stroke="#64748b" stroke-width="4"/>
  <path d="M168 335C250 220 340 215 430 180" class="faint"/><path d="M168 335C260 290 340 290 430 285" class="faint"/><path d="M168 335C260 390 340 420 430 485" class="faint"/><path d="M168 335C260 345 340 350 430 365" class="faint"/>
  <text x="285" y="500" text-anchor="middle" class="small">many futures are still being carried</text>
  <path d="M530 335H665" class="arrow"/><text x="600" y="305" text-anchor="middle" class="label">cost tightens</text>
  <rect x="700" y="145" width="430" height="390" class="panel"/><text x="915" y="195" text-anchor="middle" class="label">Stable Memory</text>
  <path d="M790 335C860 305 930 305 1000 335" class="solid"/><rect x="820" y="360" width="190" height="86" class="mem"/><text x="915" y="413" text-anchor="middle" class="label">reusable pattern</text><text x="915" y="500" text-anchor="middle" class="small">the past becomes structure</text>
</svg>
