<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">How the Math Touches Measurement</title><desc id="desc">Update budget connects to joules, seconds, meters, mass, and gravity.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 18px Arial,sans-serif;fill:#475569}.core{fill:#0f766e;stroke:#115e59;stroke-width:5;rx:22}.box{fill:#fff;stroke:#cbd5e1;stroke-width:3;rx:16}.h{font:700 22px Arial,sans-serif;fill:#0f172a}.ct{font:700 25px Arial,sans-serif;fill:#fff}.line{stroke:#334155;stroke-width:4}</style>
  <rect class="bg" width="1200" height="560"/><text x="600" y="58" text-anchor="middle" class="t">Measurement Bridge</text><text x="600" y="92" text-anchor="middle" class="s">The model has to touch the units used by real instruments.</text>
  <rect x="435" y="225" width="330" height="110" class="core"/><text x="600" y="287" text-anchor="middle" class="ct">update cost</text>
  <line x1="600" y1="225" x2="600" y2="155" class="line"/><line x1="500" y1="250" x2="290" y2="175" class="line"/><line x1="700" y1="250" x2="910" y2="175" class="line"/><line x1="500" y1="330" x2="290" y2="420" class="line"/><line x1="700" y1="330" x2="910" y2="420" class="line"/>
  <rect x="505" y="105" width="190" height="70" class="box"/><text x="600" y="148" text-anchor="middle" class="h">joules</text><rect x="170" y="130" width="220" height="70" class="box"/><text x="280" y="173" text-anchor="middle" class="h">seconds</text><rect x="800" y="130" width="220" height="70" class="box"/><text x="910" y="173" text-anchor="middle" class="h">meters</text><rect x="170" y="400" width="220" height="70" class="box"/><text x="280" y="443" text-anchor="middle" class="h">mass</text><rect x="800" y="400" width="220" height="70" class="box"/><text x="910" y="443" text-anchor="middle" class="h">gravity</text>
</svg>
