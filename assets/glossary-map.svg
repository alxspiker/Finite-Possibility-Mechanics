<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Plain-Language Glossary Map</title><desc id="desc">Important words connect back to one core idea.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 18px Arial,sans-serif;fill:#475569}.core{fill:#0f766e;stroke:#115e59;stroke-width:5;rx:20}.word{fill:#fff;stroke:#cbd5e1;stroke-width:3;rx:14}.h{font:700 21px Arial,sans-serif;fill:#0f172a}.ct{font:700 24px Arial,sans-serif;fill:#fff}.line{stroke:#94a3b8;stroke-width:3}</style>
  <rect class="bg" width="1200" height="560"/><text x="600" y="58" text-anchor="middle" class="t">Words Point Back to the Same Engine</text><text x="600" y="92" text-anchor="middle" class="s">The glossary is a map of how the paper's terms fit together.</text>
  <rect x="480" y="245" width="240" height="80" class="core"/><text x="600" y="293" text-anchor="middle" class="ct">change cost</text>
  <g><line x1="600" y1="245" x2="600" y2="150" class="line"/><line x1="480" y1="285" x2="270" y2="180" class="line"/><line x1="720" y1="285" x2="930" y2="180" class="line"/><line x1="480" y1="315" x2="270" y2="420" class="line"/><line x1="720" y1="315" x2="930" y2="420" class="line"/></g>
  <rect x="500" y="115" width="200" height="60" class="word"/><text x="600" y="153" text-anchor="middle" class="h">possibility</text><rect x="170" y="150" width="220" height="60" class="word"/><text x="280" y="188" text-anchor="middle" class="h">memory</text><rect x="810" y="150" width="220" height="60" class="word"/><text x="920" y="188" text-anchor="middle" class="h">mass</text><rect x="170" y="390" width="220" height="60" class="word"/><text x="280" y="428" text-anchor="middle" class="h">time</text><rect x="810" y="390" width="220" height="60" class="word"/><text x="920" y="428" text-anchor="middle" class="h">gravity</text>
</svg>
