<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Confinement</title><desc id="desc">Pulling bound patterns apart raises change cost faster than the system can afford.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 18px Arial,sans-serif;fill:#475569}.node{fill:#ccfbf1;stroke:#0f766e;stroke-width:5}.bond{stroke:#0f766e;stroke-width:10;stroke-linecap:round}.curve{stroke:#ef4444;stroke-width:7;fill:none}.axis{stroke:#334155;stroke-width:4}.h{font:700 23px Arial,sans-serif;fill:#0f172a}</style>
  <rect class="bg" width="1200" height="540"/><text x="600" y="58" text-anchor="middle" class="t">Confinement Means Separation Gets Too Expensive</text><text x="600" y="92" text-anchor="middle" class="s">Some bound patterns cannot be pulled apart cheaply.</text>
  <circle cx="250" cy="270" r="50" class="node"/><circle cx="430" cy="270" r="50" class="node"/><line x1="300" y1="270" x2="380" y2="270" class="bond"/><path d="M185 270H105" stroke="#ef4444" stroke-width="7"/><path d="M495 270H575" stroke="#ef4444" stroke-width="7"/><text x="340" y="390" text-anchor="middle" class="h">pull apart</text>
  <line x1="720" y1="390" x2="1080" y2="390" class="axis"/><line x1="720" y1="390" x2="720" y2="150" class="axis"/><path d="M735 375C835 360 900 300 955 220C995 165 1035 145 1070 135" class="curve"/><text x="895" y="430" text-anchor="middle" class="s">distance</text><text x="690" y="160" text-anchor="middle" class="s" transform="rotate(-90 690 160)">cost</text>
</svg>
