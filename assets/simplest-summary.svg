<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Simplest Summary</title><desc id="desc">Keeping everything open is too expensive, so reality becomes stable, directional, heavy, and structured.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 18px Arial,sans-serif;fill:#475569}.core{fill:#0f766e;stroke:#115e59;stroke-width:5;rx:24}.card{fill:#fff;stroke:#cbd5e1;stroke-width:3;rx:16}.h{font:700 22px Arial,sans-serif;fill:#0f172a}.ct{font:700 24px Arial,sans-serif;fill:#fff}</style>
  <rect class="bg" width="1200" height="560"/><text x="600" y="58" text-anchor="middle" class="t">The Simplest Summary</text><text x="600" y="92" text-anchor="middle" class="s">The universe cannot afford unlimited open possibility.</text>
  <rect x="355" y="150" width="490" height="95" class="core"/><text x="600" y="190" text-anchor="middle" class="ct">keeping everything open</text><text x="600" y="220" text-anchor="middle" class="ct">is too expensive</text>
  <rect x="110" y="330" width="180" height="70" class="card"/><text x="200" y="373" text-anchor="middle" class="h">solid</text><rect x="330" y="330" width="180" height="70" class="card"/><text x="420" y="373" text-anchor="middle" class="h">directional</text><rect x="550" y="330" width="180" height="70" class="card"/><text x="640" y="373" text-anchor="middle" class="h">heavy</text><rect x="770" y="330" width="180" height="70" class="card"/><text x="860" y="373" text-anchor="middle" class="h">structured</text><rect x="990" y="330" width="180" height="70" class="card"/><text x="1080" y="373" text-anchor="middle" class="h">stable</text>
</svg>
