<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">The Collapse Loop</title>
  <desc id="desc">As budget falls, open activity shuts down and the pattern consolidates into stable memory.</desc>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
  <style>.bg{fill:#f8fafc}.title{font:700 34px Arial,sans-serif;fill:#0f172a}.sub{font:400 20px Arial,sans-serif;fill:#475569}.card{fill:#fff;stroke:#cbd5e1;stroke-width:3;rx:18}.label{font:700 23px Arial,sans-serif;fill:#0f172a}.small{font:400 17px Arial,sans-serif;fill:#475569}.arrow{stroke:#334155;stroke-width:5;fill:none;marker-end:url(#arrow)}.battery{fill:#e2e8f0;stroke:#64748b;stroke-width:4;rx:12}.low{fill:#ef4444}.app{fill:#dbeafe;stroke:#2563eb;stroke-width:3;rx:10}.mem{fill:#ccfbf1;stroke:#0f766e;stroke-width:4;rx:14}</style></defs>
  <rect class="bg" width="1200" height="680"/><text x="600" y="58" text-anchor="middle" class="title">The Collapse Loop</text><text x="600" y="91" text-anchor="middle" class="sub">Low budget reduces open possibility. Reduced possibility settles into memory.</text>
  <rect x="80" y="185" width="230" height="190" class="card"/><text x="195" y="230" text-anchor="middle" class="label">1. Budget Falls</text><rect x="135" y="270" width="120" height="48" class="battery"/><rect x="255" y="286" width="14" height="18" fill="#64748b"/><rect x="145" y="280" width="35" height="28" class="low"/><text x="195" y="350" text-anchor="middle" class="small">energy gets tight</text>
  <path d="M315 280H425" class="arrow"/>
  <rect x="435" y="185" width="230" height="190" class="card"/><text x="550" y="230" text-anchor="middle" class="label">2. Paths Close</text><rect x="485" y="265" width="46" height="46" class="app"/><rect x="542" y="265" width="46" height="46" class="app"/><rect x="599" y="265" width="46" height="46" class="app"/><path d="M483 335H647" stroke="#ef4444" stroke-width="7" stroke-linecap="round"/><text x="550" y="350" text-anchor="middle" class="small">open options narrow</text>
  <path d="M670 280H780" class="arrow"/>
  <rect x="790" y="185" width="230" height="190" class="card"/><text x="905" y="230" text-anchor="middle" class="label">3. Memory Locks</text><rect x="830" y="265" width="150" height="70" class="mem"/><text x="905" y="308" text-anchor="middle" class="label">stable</text><text x="905" y="350" text-anchor="middle" class="small">cheaper to repeat</text>
  <path d="M905 382C770 560 340 560 195 382" class="arrow"/>
  <text x="600" y="585" text-anchor="middle" class="label">The loop reinforces itself</text><text x="600" y="615" text-anchor="middle" class="small">less budget means less openness; less openness creates stronger memory</text>
</svg>
