<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Galaxy Rotation Detail</title><desc id="desc">A disk-shaped cost sheet keeps influencing star motion farther outward.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 18px Arial,sans-serif;fill:#475569}.disk{fill:#dbeafe;stroke:#2563eb;stroke-width:5}.core{fill:#f59e0b;stroke:#92400e;stroke-width:5}.star{fill:#0f766e}.curve{stroke:#2563eb;stroke-width:7;fill:none}.axis{stroke:#334155;stroke-width:4}.h{font:700 23px Arial,sans-serif;fill:#0f172a}</style>
  <rect class="bg" width="1200" height="560"/><text x="600" y="58" text-anchor="middle" class="t">A Galaxy Is a Disk-Shaped Cost Field</text><text x="600" y="92" text-anchor="middle" class="s">The whole visible disk helps shape cheaper paths, not only the center.</text>
  <ellipse cx="390" cy="275" rx="270" ry="105" class="disk"/><circle cx="390" cy="275" r="38" class="core"/><circle cx="245" cy="250" r="10" class="star"/><circle cx="540" cy="255" r="10" class="star"/><circle cx="615" cy="285" r="10" class="star"/><text x="390" y="430" text-anchor="middle" class="h">broad disk influence</text>
  <line x1="760" y1="405" x2="1080" y2="405" class="axis"/><line x1="760" y1="405" x2="760" y2="175" class="axis"/><path d="M780 330C855 285 935 282 1065 285" class="curve"/><text x="920" y="455" text-anchor="middle" class="s">distance from center</text><text x="735" y="190" text-anchor="middle" class="s" transform="rotate(-90 735 190)">star speed</text>
</svg>
