<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">What the Model Claims to Match So Far</title><desc id="desc">A checklist of plain-language match points: time order, gravity falloff, electron scale, double slit, decay, confinement, and galaxy rotation.</desc>
  <style>.bg{fill:#f8fafc}.t{font:700 34px Arial,sans-serif;fill:#0f172a}.s{font:400 18px Arial,sans-serif;fill:#475569}.card{fill:#fff;stroke:#cbd5e1;stroke-width:3;rx:18}.check{fill:#ccfbf1;stroke:#0f766e;stroke-width:4}.h{font:700 22px Arial,sans-serif;fill:#0f172a}.small{font:400 17px Arial,sans-serif;fill:#475569}.tick{stroke:#0f766e;stroke-width:6;fill:none;stroke-linecap:round;stroke-linejoin:round}</style>
  <rect class="bg" width="1200" height="640"/><text x="600" y="58" text-anchor="middle" class="t">What the Model Claims to Match So Far</text><text x="600" y="92" text-anchor="middle" class="s">These are the places where the model says its cost picture touches measurable behavior.</text>
  <g>
    <rect x="95" y="145" width="310" height="95" class="card"/><circle cx="135" cy="193" r="18" class="check"/><path d="M126 193L134 202L148 183" class="tick"/><text x="255" y="190" text-anchor="middle" class="h">time-order overhead</text><text x="255" y="217" text-anchor="middle" class="small">history has cost</text>
    <rect x="445" y="145" width="310" height="95" class="card"/><circle cx="485" cy="193" r="18" class="check"/><path d="M476 193L484 202L498 183" class="tick"/><text x="605" y="190" text-anchor="middle" class="h">gravity-like falloff</text><text x="605" y="217" text-anchor="middle" class="small">cost gradients bend motion</text>
    <rect x="795" y="145" width="310" height="95" class="card"/><circle cx="835" cy="193" r="18" class="check"/><path d="M826 193L834 202L848 183" class="tick"/><text x="955" y="190" text-anchor="middle" class="h">electron-scale mass</text><text x="955" y="217" text-anchor="middle" class="small">pattern cost reaches mass</text>
    <rect x="95" y="285" width="310" height="95" class="card"/><circle cx="135" cy="333" r="18" class="check"/><path d="M126 333L134 342L148 323" class="tick"/><text x="255" y="330" text-anchor="middle" class="h">double-slit collapse</text><text x="255" y="357" text-anchor="middle" class="small">records are not free</text>
    <rect x="445" y="285" width="310" height="95" class="card"/><circle cx="485" cy="333" r="18" class="check"/><path d="M476 333L484 342L498 323" class="tick"/><text x="605" y="330" text-anchor="middle" class="h">decay and confinement</text><text x="605" y="357" text-anchor="middle" class="small">unstable costs fail</text>
    <rect x="795" y="285" width="310" height="95" class="card"/><circle cx="835" cy="333" r="18" class="check"/><path d="M826 333L834 342L848 323" class="tick"/><text x="955" y="330" text-anchor="middle" class="h">galaxy disk behavior</text><text x="955" y="357" text-anchor="middle" class="small">flat outer branch</text>
  </g>
  <text x="600" y="515" text-anchor="middle" class="s">These claims still have to survive better tests, but they are not meant as loose metaphors.</text>
</svg>
